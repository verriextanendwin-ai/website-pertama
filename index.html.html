<!DOCTYPE html>
<html>
<head>
    <title>Mini Game Tebak Angka</title>

    <style>
        body {
            background: #1e1e2f;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }

        input {
            padding: 8px;
            font-size: 16px;
            width: 60px;
            text-align: center;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
        }

        #hasil {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>🎮 Game Tebak Angka (1 - 10)</h1>

    <input type="number" id="tebakan" min="1" max="10">
    <button onclick="cekTebakan()">Tebak!</button>
    <button onclick="resetGame()">Reset</button>
    <div id="hasil"></div>

<script>
let angkaBenar = Math.floor(Math.random() * 10) + 1;

function cekTebakan() {

    let inputUser = document.getElementById("tebakan").value;

    if (inputUser == angkaBenar) {
        document.getElementById("hasil").innerHTML = "🔥 BENAR! Kamu jago!";
    } 
    else if (inputUser < angkaBenar) {
        document.getElementById("hasil").innerHTML = "📉 Terlalu kecil!";
    }
    else {
        document.getElementById("hasil").innerHTML = "📈 Terlalu besar!";
    }

}

function resetGame() {
    angkaBenar = Math.floor(Math.random() * 10) + 1;
    document.getElementById("hasil").innerHTML = "Game direset! Tebak lagi!";
    document.getElementById("tebakan").value = "";
}
</script>

</body>
</html>
